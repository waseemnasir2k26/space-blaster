class Audio{
  constructor(){this.c=null;this.on=true;this.u=false;}
  init(){try{this.c=new(window.AudioContext||window.webkitAudioContext)();}catch(e){this.on=false;}}
  unlock(){if(!this.c)this.init();if(this.c&&this.c.state==='suspended')this.c.resume();this.u=true;}
  _o(f,f2,t,d,v=.12){if(!this.on||!this.c||!this.u)return;const o=this.c.createOscillator(),g=this.c.createGain();o.type=t;o.frequency.setValueAtTime(f,this.c.currentTime);if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(f2,20),this.c.currentTime+d);g.gain.setValueAtTime(v,this.c.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.c.currentTime+d);o.connect(g).connect(this.c.destination);o.start();o.stop(this.c.currentTime+d);}
  _n(d,v=.1){if(!this.on||!this.c||!this.u)return;const sr=this.c.sampleRate,buf=this.c.createBuffer(1,sr*d,sr),ch=buf.getChannelData(0);for(let i=0;i<ch.length;i++)ch[i]=Math.random()*2-1;const s=this.c.createBufferSource();s.buffer=buf;const g=this.c.createGain();g.gain.setValueAtTime(v,this.c.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.c.currentTime+d);const fl=this.c.createBiquadFilter();fl.type='lowpass';fl.frequency.value=800;s.connect(fl).connect(g).connect(this.c.destination);s.start();s.stop(this.c.currentTime+d);}
  shoot(){this._o(880,220,'sawtooth',.06,.07);}
  missile(){this._o(200,600,'sawtooth',.12,.06);}
  eShoot(){this._o(440,110,'square',.07,.05);}
  explode(){this._n(.22,.14);this._o(80,20,'sine',.22,.1);}
  bigExplode(){this._n(.45,.22);this._o(60,15,'sine',.5,.18);}
  powerUp(){if(!this.on||!this.c||!this.u)return;[523,659,784].forEach((f,i)=>setTimeout(()=>this._o(f,f*1.02,'sine',.1,.08),i*50));}
  hit(){this._n(.08,.15);this._o(150,40,'sawtooth',.08,.08);}
  shieldHit(){this._o(1200,2400,'sine',.07,.06);}
  upgrade(){this._o(440,880,'sine',.15,.1);setTimeout(()=>this._o(660,1320,'sine',.15,.08),100);}
  levelUp(){[440,554,659,880].forEach((f,i)=>setTimeout(()=>this._o(f,f*1.01,'sine',.12,.08),i*80));}

const PMAX=400;
class PPool{constructor(){this.p=[];for(let i=0;i<PMAX;i++)this.p.push({a:false,x:0,y:0,vx:0,vy:0,l:0,ml:0,s:0,c:''});}
emit(x,y,n,cfg){for(let i=0;i<n;i++){const p=this.p.find(p=>!p.a);if(!p)return;const a=Math.random()*Math.PI*2,sp=cfg.ms+Math.random()*(cfg.xs-cfg.ms);p.a=true;p.x=x;p.y=y;p.vx=Math.cos(a)*sp;p.vy=Math.sin(a)*sp;p.l=cfg.l*(.5+Math.random()*.5);p.ml=p.l;p.s=cfg.s*(.5+Math.random()*.5);p.c=cfg.c;}}
update(dt){for(const p of this.p){if(!p.a)continue;p.x+=p.vx*dt;p.y+=p.vy*dt;p.l-=dt;if(p.l<=0)p.a=false;}}
draw(ctx){for(const p of this.p){if(!p.a)continue;const a=p.l/p.ml,s=p.s*(.3+.7*a);ctx.globalAlpha=a;ctx.fillStyle=p.c;ctx.fillRect(p.x-s/2,p.y-s/2,s,s);}ctx.globalAlpha=1;}}

class Bullets{
  constructor(n){this.p=[];for(let i=0;i<n;i++)this.p.push({a:false,x:0,y:0,vx:0,vy:0,r:3,d:1,pl:true,c:'#0ef',pierce:0,explode:false,home:false,tx:0,ty:0});}
  fire(x,y,vx,vy,pl,d=1,opts={}){const b=this.p.find(b=>!b.a);if(!b)return;b.a=true;b.x=x;b.y=y;b.vx=vx;b.vy=vy;b.pl=pl;b.d=d;b.r=pl?3:4;b.c=pl?(opts.c||'#0ef'):'#f44';b.pierce=opts.pierce||0;b.explode=opts.explode||false;b.home=opts.home||false;b.tx=opts.tx||0;b.ty=opts.ty||0;}
  update(dt,enemies,boss){for(const b of this.p){if(!b.a)continue;if(b.home&&b.pl){let best=null,bd=Infinity;const all=[...enemies];if(boss&&boss.alive)all.push(boss);for(const e of all){if(!e.alive)continue;const dx=e.x-b.x,dy=e.y-b.y,d=dx*dx+dy*dy;if(d<bd){bd=d;best=e;}}if(best){const dx=best.x-b.x,dy=best.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;b.vx+=(dx/d)*.3*dt;b.vy+=(dy/d)*.3*dt;const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>8){b.vx=(b.vx/spd)*8;b.vy=(b.vy/spd)*8;}}}
  b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y<-15||b.y>H+15||b.x<-15||b.x>W+15)b.a=false;}}
  draw(ctx){for(const b of this.p){if(!b.a)continue;ctx.save();ctx.shadowColor=b.c;ctx.shadowBlur=b.home?12:8;ctx.fillStyle=b.c;ctx.beginPath();if(b.pl){if(b.home){ctx.arc(b.x,b.y,4,0,Math.PI*2);}else{ctx.roundRect(b.x-2,b.y-6,4,12,2);}ctx.fill();}else{ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();}ctx.restore();}}
  active(){return this.p.filter(b=>b.a);}
}

// ═══════════════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════════════
class Player{
  constructor(ship){const s=SHIPS.find(s=>s.id===ship)||SHIPS[0];this.shipId=ship;this.x=W/2;this.y=H-100;this.r=18;this.hp=s.hp;this.maxHp=s.hp;this.spd=s.spd;this.fr=s.fr;this.baseDmg=s.dmg;this.color=s.color;this.special=s.special;this.lastFire=0;this.shield=false;this.shieldT=0;this.inv=false;this.invT=0;this.alive=true;
  // Upgrades state
  this.sideGuns=0;this.rearGun=0;this.piercing=0;this.homing=0;this.spread=0;this.fireRateBonus=0;this.dmgBonus=0;this.orbiters=0;this.regen=0;this.regenT=0;this.magnet=0;this.xpMult=1;this.luckMult=1;this.bomb=0;this.bombT=0;this.slowField=0;this.drone=0;this.hpBonus=0;this.speedBonus=0;this.critChance=0;this.explodeShot=false;this.autoShield=0;this.autoShieldT=0;
  // XP
  this.xp=0;this.level=0;this.xpNext=100;
  this.orbAngle=0;
  this.killStreak=0;this.streakT=0;
  }
  get dmg(){return this.baseDmg+this.dmgBonus;}
  get effectiveFR(){return Math.max(60,this.fr*(1-this.fireRateBonus*.15));}
  get effectiveSpd(){return this.spd*(1+this.speedBonus*.12);}
  addXP(n){this.xp+=Math.floor(n*this.xpMult);while(this.xp>=this.xpNext){this.xp-=this.xpNext;this.level++;this.xpNext=Math.floor(100*(1.15**this.level));return true;}return false;}
  applyUpgrade(id){const u=UPGRADES.find(u=>u.id===id);if(!u)return;if(id==='sideGuns')this.sideGuns++;else if(id==='rearGun')this.rearGun=1;else if(id==='piercing')this.piercing++;else if(id==='homing')this.homing++;else if(id==='spread')this.spread++;else if(id==='fireRate')this.fireRateBonus++;else if(id==='dmgUp')this.dmgBonus++;else if(id==='orbiters')this.orbiters++;else if(id==='regen')this.regen++;else if(id==='magnet')this.magnet++;else if(id==='xpBoost')this.xpMult+=.3;else if(id==='luck')this.luckMult+=.3;else if(id==='bomb')this.bomb=1;else if(id==='slowField')this.slowField=1;else if(id==='drone')this.drone++;else if(id==='hpUp'){this.hpBonus++;this.maxHp++;this.hp++;}else if(id==='speedUp')this.speedBonus++;else if(id==='critChance')this.critChance+=.15;else if(id==='explode')this.explodeShot=true;else if(id==='shield2')this.autoShield++;}
  update(dt,inp){
    if(inp.a){this.x+=inp.dx*this.effectiveSpd*dt;this.y+=inp.dy*this.effectiveSpd*dt;}
    this.x=Math.max(this.r,Math.min(W-this.r,this.x));this.y=Math.max(this.r,Math.min(H-this.r,this.y));
    if(this.inv){this.invT-=dt*16.67;if(this.invT<=0)this.inv=false;}
    if(this.shield){this.shieldT-=dt*16.67;if(this.shieldT<=0)this.shield=false;}
    if(this.regen>0){this.regenT-=dt*16.67;if(this.regenT<=0&&this.hp<this.maxHp){this.hp++;this.regenT=8000/this.regen;}}
    if(this.autoShield>0){this.autoShieldT-=dt*16.67;if(this.autoShieldT<=0&&!this.shield){this.shield=true;this.shieldT=3000;this.autoShieldT=20000/this.autoShield;}}
    if(this.bomb){this.bombT-=dt*16.67;}
    this.orbAngle+=dt*.06;
    this.streakT-=dt*16.67;if(this.streakT<=0)this.killStreak=0;
  }
  canFire(now){return now-this.lastFire>=this.effectiveFR;}
  fire(now,bul){
    this.lastFire=now;const d=this.dmg;const isCrit=Math.random()<this.critChance;const fd=isCrit?d*3:d;const opts={pierce:this.piercing,explode:this.explodeShot,c:isCrit?'#ff0':'#0ef'};
    // Main shot
    bul.fire(this.x,this.y-this.r-6,0,-10,true,fd,opts);
    // Spread
    for(let i=1;i<=this.spread;i++){const a=i*.12;bul.fire(this.x,this.y-this.r-4,Math.sin(a)*2,-10,true,fd,opts);bul.fire(this.x,this.y-this.r-4,-Math.sin(a)*2,-10,true,fd,opts);}
    // Side guns
    for(let i=0;i<this.sideGuns;i++){bul.fire(this.x-14,this.y-8,-1.5-i*.5,-8,true,fd,opts);bul.fire(this.x+14,this.y-8,1.5+i*.5,-8,true,fd,opts);}
    // Rear
    if(this.rearGun)bul.fire(this.x,this.y+this.r+4,0,7,true,fd,opts);
    // Homing
    for(let i=0;i<this.homing;i++){bul.fire(this.x+(i%2?10:-10),this.y-this.r,(i%2?.5:-.5),-6,true,fd,{...opts,home:true,c:'#f80'});}
  }
  fireDrones(now,bul){if(this.drone<=0)return;for(let i=0;i<this.drone;i++){const a=this.orbAngle+i*(Math.PI*2/this.drone);const dx=Math.cos(a)*50,dy=Math.sin(a)*50;bul.fire(this.x+dx,this.y+dy,0,-9,true,this.dmg,{c:'#8f8'});}}
  takeDmg(aud){if(this.inv)return false;if(this.shield){this.shield=false;aud.shieldHit();return false;}this.hp--;this.inv=true;this.invT=1200;this.killStreak=0;aud.hit();if(this.hp<=0){this.alive=false;return true;}return false;}
  revive(){this.hp=this.maxHp;this.alive=true;this.inv=true;this.invT=3000;this.shield=true;this.shieldT=5000;this.x=W/2;this.y=H-100;}
  draw(ctx){
    if(!this.alive)return;if(this.inv&&Math.floor(Date.now()/80)%2===0)return;
    ctx.save();ctx.translate(this.x,this.y);
    // Engines
    ctx.shadowColor=this.color;ctx.shadowBlur=10;ctx.fillStyle=this.color+'80';
    ctx.beginPath();ctx.ellipse(-7,14,3,5+Math.random()*4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(7,14,3,5+Math.random()*4,0,0,Math.PI*2);ctx.fill();
    // Body
    ctx.shadowBlur=12;ctx.fillStyle=this.color;
    ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(-15,15);ctx.lineTo(-5,11);ctx.lineTo(0,17);ctx.lineTo(5,11);ctx.lineTo(15,15);ctx.closePath();ctx.fill();
    // Cockpit
    ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.globalAlpha=.7;ctx.beginPath();ctx.ellipse(0,-4,3,7,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    // Shield
    if(this.shield){ctx.strokeStyle='rgba(50,180,255,.45)';ctx.lineWidth=2;ctx.shadowColor='#0af';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.stroke();}
    // Orbiters
    if(this.orbiters>0){ctx.shadowBlur=6;for(let i=0;i<this.orbiters*2;i++){const a=this.orbAngle+i*(Math.PI*2/(this.orbiters*2));ctx.fillStyle='#0df';ctx.beginPath();ctx.arc(Math.cos(a)*30,Math.sin(a)*30,4,0,Math.PI*2);ctx.fill();}}
    // Slow field
    if(this.slowField){ctx.strokeStyle='rgba(160,100,255,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,80,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
//  ENEMIES
// ═══════════════════════════════════════════════════════════════
class Enemy{
  constructor(typeId,x,y,wave){const t=ENEMY_TYPES.find(t=>t.id===typeId);this.type=typeId;this.x=x;this.y=y;this.hp=t.hp+Math.floor(wave/3);this.maxHp=this.hp;this.spd=t.spd+wave*.03;this.score=t.score;this.color=t.color;this.r=t.r;this.alive=true;this.st=Date.now();this.sx=x;this.lf=0;this.fr=t.fr||99999;this.bs=t.bs||3;this.shieldHp=t.shield||0;this.hitFlash=0;}
  update(dt,px,py,bul,aud,slow){
    const spMul=slow?.7:1;const t=(Date.now()-this.st)/1000;this.hitFlash=Math.max(0,this.hitFlash-dt*16.67);
    if(this.type==='basic')this.y+=this.spd*dt*spMul;
    else if(this.type==='zigzag'){this.x=this.sx+Math.sin(t*3.5)*50;this.y+=this.spd*dt*spMul;}
    else if(this.type==='tank'){if(this.y<120)this.y+=this.spd*dt*spMul;else{this.x+=Math.sin(t*1.5)*1*dt;const now=Date.now();if(now-this.lf>this.fr){this.lf=now;const dx=px-this.x,dy=py-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;bul.fire(this.x,this.y+this.r,(dx/d)*this.bs,(dy/d)*this.bs,false);aud.eShoot();}}}
    else if(this.type==='kamikaze'){const dx=px-this.x,dy=py-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;const acc=1+t*.5;this.x+=(dx/d)*this.spd*acc*dt*spMul*.6;this.y+=(dy/d)*this.spd*acc*dt*spMul*.6;}
    else if(this.type==='splitter')this.y+=this.spd*dt*spMul;
    else if(this.type==='shielded')this.y+=this.spd*dt*spMul;
    else if(this.type==='sniper'){if(this.y<100)this.y+=this.spd*dt*spMul;else{const now=Date.now();if(now-this.lf>this.fr){this.lf=now;const dx=px-this.x,dy=py-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;bul.fire(this.x,this.y,(dx/d)*this.bs,(dy/d)*this.bs,false);aud.eShoot();}}}
    else if(this.type==='swarm'){const dx=px-this.x,dy=py-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;this.x+=(dx/d)*this.spd*dt*spMul*.4+Math.sin(t*5+this.sx)*1.5*dt;this.y+=this.spd*dt*spMul;}
    if(this.y>H+40||this.x<-40||this.x>W+40)this.alive=false;
  }
  takeDmg(d){if(this.shieldHp>0){this.shieldHp-=d;this.hitFlash=100;if(this.shieldHp<=0){const over=-this.shieldHp;this.hp-=over;}return this.hp<=0?(this.alive=false,true):false;}this.hp-=d;this.hitFlash=100;if(this.hp<=0){this.alive=false;return true;}return false;}
  draw(ctx){
    ctx.save();ctx.translate(this.x,this.y);ctx.shadowColor=this.color;ctx.shadowBlur=8;
    ctx.fillStyle=this.hitFlash>0?'#fff':this.color;
    // Different shapes per type
    if(this.type==='basic'){ctx.beginPath();ctx.moveTo(0,16);ctx.lineTo(-12,-10);ctx.lineTo(0,-3);ctx.lineTo(12,-10);ctx.closePath();ctx.fill();}
    else if(this.type==='zigzag'){ctx.beginPath();ctx.moveTo(0,14);ctx.lineTo(-16,-5);ctx.lineTo(-7,-12);ctx.lineTo(0,-7);ctx.lineTo(7,-12);ctx.lineTo(16,-5);ctx.closePath();ctx.fill();}
    else if(this.type==='tank'){ctx.beginPath();ctx.moveTo(0,20);ctx.lineTo(-18,5);ctx.lineTo(-16,-14);ctx.lineTo(-7,-20);ctx.lineTo(7,-20);ctx.lineTo(16,-14);ctx.lineTo(18,5);ctx.closePath();ctx.fill();}
    else if(this.type==='kamikaze'){ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();}
    else if(this.type==='splitter'){ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(14,8);ctx.lineTo(-14,8);ctx.closePath();ctx.fill();}
    else if(this.type==='shielded'){ctx.beginPath();ctx.arc(0,0,this.r-2,0,Math.PI*2);ctx.fill();if(this.shieldHp>0){ctx.strokeStyle='rgba(100,200,255,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,this.r+4,0,Math.PI*2);ctx.stroke();}}
    else if(this.type==='sniper'){ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(8,14);ctx.lineTo(-8,14);ctx.closePath();ctx.fill();}
    else if(this.type==='swarm'){ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();}
    // HP bar for tough enemies
    if(this.maxHp>2&&this.hp<this.maxHp){const bw=24;ctx.shadowBlur=0;ctx.fillStyle='#333';ctx.fillRect(-bw/2,-this.r-8,bw,3);ctx.fillStyle='#0f0';ctx.fillRect(-bw/2,-this.r-8,bw*(this.hp/this.maxHp),3);}
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
//  BOSS
// ═══════════════════════════════════════════════════════════════
class Boss{
  constructor(idx,wave){const b=BOSSES[idx%BOSSES.length];this.name=b.name;this.x=W/2;this.y=-60;this.hp=b.hp+wave*8;this.maxHp=this.hp;this.r=b.r;this.score=b.score+wave*200;this.alive=true;this.phase=0;this.pt=0;this.lf=0;this.dir=1;this.entering=true;this.ty=75;this.spawns=b.spawns||false;this.teleports=b.teleports||false;this.color=b.color;this.phases=b.phases;this.spawnT=0;this.teleT=0;this.hitFlash=0;}
  update(dt,px,py,bul,aud){
    this.hitFlash=Math.max(0,this.hitFlash-dt*16.67);
    if(this.entering){this.y+=1.5*dt;if(this.y>=this.ty){this.entering=false;this.pt=0;}return null;}
    this.pt+=dt*16.67;if(this.pt>3500){this.phase=(this.phase+1)%this.phases;this.pt=0;}
    if(this.phase===0){this.x+=this.dir*1.8*dt;if(this.x>W-50)this.dir=-1;if(this.x<50)this.dir=1;}
    else if(this.phase===1){const dx=px-this.x;this.x+=Math.sign(dx)*Math.min(Math.abs(dx),2*dt);}
    else if(this.phase===2){const t=this.pt/500;this.x=W/2+Math.cos(t)*100;this.y=this.ty+Math.sin(t)*25;}
    else if(this.phase===3){/* Rage phase - faster movement */this.x+=this.dir*3*dt;if(this.x>W-40)this.dir=-1;if(this.x<40)this.dir=1;}
    // Teleport
    if(this.teleports){this.teleT-=dt*16.67;if(this.teleT<=0){this.x=50+Math.random()*(W-100);this.teleT=4000;}}
    // Fire
    const now=Date.now();const fr=this.hp<this.maxHp*.3?400:700;
    if(now-this.lf>fr){this.lf=now;
    if(this.phase===0){for(let a=-.35;a<=.35;a+=.14)bul.fire(this.x,this.y+this.r,Math.sin(a)*3,4,false);}
    else if(this.phase===1){const dx=px-this.x,dy=py-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;bul.fire(this.x,this.y+this.r,(dx/d)*4.5,(dy/d)*4.5,false);}
    else if(this.phase===2){for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i+this.pt/800;bul.fire(this.x,this.y,Math.cos(a)*3,Math.sin(a)*3,false);}}
    else{for(let a=-.5;a<=.5;a+=.1)bul.fire(this.x,this.y+this.r,Math.sin(a)*4,5,false);}
    aud.eShoot();}
    // Spawn minions
    let spawn=null;
    if(this.spawns){this.spawnT-=dt*16.67;if(this.spawnT<=0){this.spawnT=5000;spawn={x:this.x,y:this.y+this.r};}}
    return spawn;
  }
  takeDmg(d){this.hp-=d;this.hitFlash=80;if(this.hp<=0){this.alive=false;return true;}return false;}
  draw(ctx){
    ctx.save();ctx.translate(this.x,this.y);
    ctx.shadowColor=this.color;ctx.shadowBlur=20;ctx.fillStyle=this.hitFlash>0?'#fff':this.color;
    ctx.beginPath();ctx.moveTo(0,this.r);ctx.lineTo(-this.r,8);ctx.lineTo(-this.r+6,-this.r+12);ctx.lineTo(-12,-this.r);ctx.lineTo(0,-this.r+8);ctx.lineTo(12,-this.r);ctx.lineTo(this.r-6,-this.r+12);ctx.lineTo(this.r,8);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    ctx.restore();
  }
  drawHP(ctx){const bw=W-50,bh=8,bx=25,by=12;ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(bx,by,bw,bh);const pct=Math.max(0,this.hp/this.maxHp);const g=ctx.createLinearGradient(bx,0,bx+bw,0);g.addColorStop(0,this.color);g.addColorStop(1,'#f44');ctx.fillStyle=g;ctx.fillRect(bx,by,bw*pct,bh);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);ctx.font='bold 9px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(this.name,W/2,by+bh+12);}
}

// ═══════════════════════════════════════════════════════════════
//  POWER-UPS
// ═══════════════════════════════════════════════════════════════
class PU{constructor(x,y,t){this.x=x;this.y=y;this.type=t;this.r=11;this.alive=true;this.st=Date.now();}
update(dt,mag,px,py){this.y+=1.5*dt;this.x+=Math.sin((Date.now()-this.st)/300)*.3;if(mag>0){const dx=px-this.x,dy=py-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<60+mag*40){this.x+=dx/d*3*dt;this.y+=dy/d*3*dt;}}if(this.y>H+20)this.alive=false;}
draw(ctx){ctx.save();ctx.translate(this.x,this.y);ctx.shadowBlur=10;if(this.type==='health'){ctx.shadowColor='#f44';ctx.fillStyle='#f44';ctx.fillRect(-3,-7,6,14);ctx.fillRect(-7,-3,14,6);}else if(this.type==='xp'){ctx.shadowColor='#0ff';ctx.fillStyle='#0ff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('★',0,5);}else if(this.type==='crystal'){ctx.shadowColor='#a5f';ctx.fillStyle='#a5f';ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(7,0);ctx.lineTo(0,10);ctx.lineTo(-7,0);ctx.closePath();ctx.fill();}ctx.restore;ctx.restore();}}
function tryDrop(x,y,arr,luck){if(Math.random()>.18*luck)return;const r=Math.random();if(r<.35)arr.push(new PU(x,y,'health'));else if(r<.7)arr.push(new PU(x,y,'xp'));else arr.push(new PU(x,y,'crystal'));}

//  MAIN GAME
// ═══════════════════════════════════════════════════════════════
class Game{
  constructor(){
    this.cv=document.getElementById('c');this.cx=this.cv.getContext('2d');
    this.state='MENU';this.aud=new Audio();this.sdk=new CrazySDK();
    this.par=new PPool();this.bul=new Bullets(300);
    this.pl=null;this.enemies=[];this.boss=null;this.pus=[];
    this.stars=mkStars();this.score=0;this.hs=0;
    this.shX=0;this.shY=0;this.shD=0;this.shI=0;
    this.wvTxt='';this.wvTxtT=0;this.sc=1;this.ox=0;this.oy=0;
    this.inp={a:false,dx:0,dy:0,lx:0,ly:0};this.lt=0;
    this.combo=1;this.comboT=0;this.extraUsed=false;
    // Wave
    this.wave=0;this.eLft=0;this.toSp=0;this.spT=0;this.wvDel=0;this.isBoss=false;this.bossSpd=false;this.zone=0;
    // Mode
    this.mode='endless';this.bossRushIdx=0;
    // Stats
    this.kills=0;this.bosses=0;this.maxCombo=1;this.maxStreak=0;this.noHitBoss=true;this.upgCount=0;this.crystalsEarned=0;
    // Progression
    this.crystals=0;this.unlockedShips=['striker'];this.selectedShip='striker';this.earnedAch=[];
    this.adWvCnt=0;

    // Score popups
    this.popups=[];

    this.resize();window.addEventListener('resize',()=>this.resize());

  resize(){const w=window.innerWidth,h=window.innerHeight;this.sc=Math.min(w/W,h/H);this.cv.width=W;this.cv.height=H;this.cv.style.width=(W*this.sc)+'px';this.cv.style.height=(H*this.sc)+'px';this.ox=(w-W*this.sc)/2;this.oy=(h-H*this.sc)/2;this.cv.style.left=this.ox+'px';this.cv.style.top=this.oy+'px';}

    const mv=(cx,cy)=>{if(!this.inp.a)return;const p=this.gc(cx,cy);this.inp.dx=p.x-this.inp.lx;this.inp.dy=p.y-this.inp.ly;this.inp.lx=p.x;this.inp.ly=p.y;};
    const up=()=>{this.inp.a=false;this.inp.dx=0;this.inp.dy=0;};

    this.cv.addEventListener('touchmove',e=>{e.preventDefault();mv(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    this.cv.addEventListener('touchend',e=>{e.preventDefault();up();},{passive:false});

  startGame(){
    this.state='PLAYING';this.score=0;this.combo=1;this.comboT=0;this.extraUsed=false;this.adWvCnt=0;
    this.kills=0;this.bosses=0;this.maxCombo=1;this.maxStreak=0;this.noHitBoss=true;this.upgCount=0;this.crystalsEarned=0;this.popups=[];
    this.pl=new Player(this.selectedShip);

    this.wave=0;this.eLft=0;this.toSp=0;this.spT=0;this.wvDel=0;this.isBoss=false;this.bossSpd=false;this.zone=0;this.bossRushIdx=0;

  nextWave(){

    else if(this.mode==='blitz'){this.isBoss=this.wave%3===0;this.bossSpd=false;this.toSp=this.isBoss?0:4+this.wave*2;this.eLft=this.isBoss?1:this.toSp;}
    else{this.isBoss=this.wave%5===0;this.bossSpd=false;this.toSp=this.isBoss?0:5+(this.wave-1)*2;this.eLft=this.isBoss?1:this.toSp;}

    this.wvTxt=this.isBoss?`⚠ BOSS - ${ZONES[this.zone].name}`:`WAVE ${this.wave} - ${ZONES[this.zone].name}`;this.wvTxtT=2200;
  }

  getEType(){const w=this.wave;const r=Math.random();if(w<3)return'basic';if(w<5)return r<.5?'basic':r<.8?'zigzag':'swarm';if(w<8)return r<.3?'basic':r<.5?'zigzag':r<.7?'kamikaze':r<.85?'swarm':'tank';if(w<12)return r<.2?'basic':r<.35?'zigzag':r<.5?'kamikaze':r<.65?'tank':r<.8?'splitter':r<.9?'shielded':'sniper';return['basic','zigzag','kamikaze','tank','splitter','shielded','sniper','swarm'][Math.floor(r*8)];}

  showUpgradePicker(){
    this.state='UPGRADE';this.sdk.gpStop();
    const avail=UPGRADES.filter(u=>{let cur=0;if(u.id==='sideGuns')cur=this.pl.sideGuns;else if(u.id==='rearGun')cur=this.pl.rearGun;else if(u.id==='piercing')cur=this.pl.piercing;else if(u.id==='homing')cur=this.pl.homing;else if(u.id==='spread')cur=this.pl.spread;else if(u.id==='fireRate')cur=this.pl.fireRateBonus;else if(u.id==='dmgUp')cur=this.pl.dmgBonus;else if(u.id==='orbiters')cur=this.pl.orbiters;else if(u.id==='regen')cur=this.pl.regen;else if(u.id==='magnet')cur=this.pl.magnet;else if(u.id==='xpBoost')cur=Math.round((this.pl.xpMult-1)/.3);else if(u.id==='luck')cur=Math.round((this.pl.luckMult-1)/.3);else if(u.id==='bomb')cur=this.pl.bomb;else if(u.id==='slowField')cur=this.pl.slowField;else if(u.id==='drone')cur=this.pl.drone;else if(u.id==='hpUp')cur=this.pl.hpBonus;else if(u.id==='speedUp')cur=this.pl.speedBonus;else if(u.id==='critChance')cur=Math.round(this.pl.critChance/.15);else if(u.id==='explode')cur=this.pl.explodeShot?1:0;else if(u.id==='shield2')cur=this.pl.autoShield;return cur<u.max;});
    // Weighted by rarity
    const weighted=[];for(const u of avail){const w=u.rarity===1?5:u.rarity===2?3:1;for(let i=0;i<w;i++)weighted.push(u);}
    const picks=[];while(picks.length<3&&weighted.length>0){const i=Math.floor(Math.random()*weighted.length);const u=weighted[i];if(!picks.find(p=>p.id===u.id))picks.push(u);weighted.splice(i,1);}
    if(picks.length===0){this.state='PLAYING';this.sdk.gpStart();return;}
    const el=document.getElementById('upgCards');el.innerHTML='';
    const rColors={1:'Common',2:'Rare',3:'Epic'};const rC={1:'#aaa',2:'#4af',3:'#a5f'};
    for(const u of picks){const d=document.createElement('div');d.className='ui';d.innerHTML=`<div class="ico">${u.ico}</div><div class="nm">${u.name}</div><div class="ds">${u.desc}</div><div class="rr" style="color:${rC[u.rarity]}">${rColors[u.rarity]}</div>`;
    d.onclick=()=>{this.pl.applyUpgrade(u.id);this.upgCount++;this.aud.upgrade();document.getElementById('upgPick').style.display='none';this.state='PLAYING';this.sdk.gpStart();};
    el.appendChild(d);}
    document.getElementById('upgPick').style.display='flex';
  }

  pause(){if(this.state!=='PLAYING')return;this.state='PAUSED';document.getElementById('pWave').textContent=this.wave;document.getElementById('pScore').textContent=this.score.toLocaleString();document.getElementById('pKills').textContent=this.kills;menu('pauseScr',0);this.sdk.gpStop();}
  resume(){if(this.state!=='PAUSED')return;this.state='PLAYING';menu('pauseScr',1);this.sdk.gpStart();}

  async gameOver(){
    this.state='GAMEOVER';this.sdk.gpStop();
    // Crystals earned
    this.crystalsEarned=Math.floor(this.score/100)+this.wave*5+this.bosses*50;this.crystals+=this.crystalsEarned;
    const isNew=this.score>this.hs;if(isNew){this.hs=this.score;this.sdk.happy();}
    // Check achievements
    const st={kills:this.kills,wave:this.wave,bosses:this.bosses,noHitBoss:this.noHitBoss,maxCombo:this.maxCombo,shipsOwned:this.unlockedShips.length,score:this.score,upgrades:this.upgCount,maxStreak:this.maxStreak};
    for(const a of ACHIEVEMENTS){if(!this.earnedAch.includes(a.id)&&a.check(st)){this.earnedAch.push(a.id);this.crystals+=a.reward;this.crystalsEarned+=a.reward;}}
    await this.saveData();
    document.getElementById('finalScore').textContent=this.score.toLocaleString();document.getElementById('finalHS').textContent='HIGH SCORE: '+this.hs.toLocaleString();document.getElementById('newHS').style.display=isNew?'block':'none';
    document.getElementById('crystalEarn').textContent=`💎 +${this.crystalsEarned} Crystals Earned`;
    document.getElementById('runStats').innerHTML=`<div class="st"><div class="sv">${this.wave}</div><div class="sl">Waves</div></div><div class="st"><div class="sv">${this.kills}</div><div class="sl">Kills</div></div><div class="st"><div class="sv">${this.bosses}</div><div class="sl">Bosses</div></div><div class="st"><div class="sv">${this.upgCount}</div><div class="sl">Upgrades</div></div>`;
    document.getElementById('extraLifeBtn').style.display=(!this.extraUsed&&this.sdk.ok)?'block':'none';
    menu('overScr',0);document.getElementById('pauseBtn').style.display='none';
  }

  revive(){this.extraUsed=true;this.pl.revive();this.bul.p.forEach(b=>{if(!b.pl)b.a=false;});this.state='PLAYING';menu('overScr',1);document.getElementById('pauseBtn').style.display='flex';this.sdk.gpStart();}
  goMenu(){this.state='MENU';menu('menuScr',0);menu('pauseScr',1);menu('overScr',1);document.getElementById('upgPick').style.display='none';document.getElementById('pauseBtn').style.display='none';this.refreshMenu();}

  shake(i,d){this.shI=i;this.shD=d;}
  addScore(pts){const p=Math.floor(pts*this.combo);this.score+=p;this.combo=Math.min(this.combo+.1,4);if(this.combo>this.maxCombo)this.maxCombo=this.combo;this.comboT=1500;return p;}
  popup(x,y,txt,c){this.popups.push({x,y,txt,c,t:800});}

  // ═══════ UPDATE ═══════
  update(dt){
    const now=Date.now();this.comboT-=dt*16.67;if(this.comboT<=0)this.combo=Math.max(1,this.combo-.004*dt);
    if(this.wvTxtT>0)this.wvTxtT-=dt*16.67;
    // Popups
    for(let i=this.popups.length-1;i>=0;i--){this.popups[i].y-=1.5*dt;this.popups[i].t-=dt*16.67;if(this.popups[i].t<=0)this.popups.splice(i,1);}
    // Player
    this.pl.update(dt,this.inp);
    if(this.pl.canFire(now)){this.pl.fire(now,this.bul);this.aud.shoot();if(this.pl.drone>0&&now%500<20)this.pl.fireDrones(now,this.bul);}
    // Bomb
    if(this.pl.bomb&&this.pl.bombT<=0){this.pl.bombT=30000;this.aud.bomb();this.shake(10,400);for(const e of this.enemies){e.alive=false;this.addScore(e.score);this.par.emit(e.x,e.y,10,{ms:1,xs:4,l:300,s:5,c:e.color});}this.enemies=[];}
    // Enemies
    const slow=this.pl.slowField>0;
    for(let i=this.enemies.length-1;i>=0;i--){this.enemies[i].update(dt,this.pl.x,this.pl.y,this.bul,this.aud,slow);if(!this.enemies[i].alive){this.eLft--;this.enemies.splice(i,1);}}
    // Boss
    if(this.boss){const sp=this.boss.update(dt,this.pl.x,this.pl.y,this.bul,this.aud);if(sp){this.enemies.push(new Enemy('swarm',sp.x-20,sp.y,this.wave));this.enemies.push(new Enemy('swarm',sp.x+20,sp.y,this.wave));this.eLft+=2;}
    if(!this.boss.alive){const pts=this.addScore(this.boss.score);this.popup(this.boss.x,this.boss.y,'+'+pts,'#ff0');this.par.emit(this.boss.x,this.boss.y,45,{ms:1,xs:7,l:600,s:8,c:this.boss.color});this.par.emit(this.boss.x,this.boss.y,30,{ms:2,xs:9,l:400,s:5,c:'#ff0'});this.shake(10,500);this.aud.bigExplode();this.bosses++;this.eLft--;this.sdk.happy();this.boss=null;}}
    // Spawn
    if(!this.isBoss&&this.toSp>0){this.wvDel-=dt*16.67;if(this.wvDel<=0){this.spT-=dt*16.67;if(this.spT<=0){const t=this.getEType();const x=25+Math.random()*(W-50);this.enemies.push(new Enemy(t,x,-25,this.wave));this.toSp--;this.spT=Math.max(300,1300-this.wave*40);}}}
    // Boss spawn
    if(this.isBoss&&!this.bossSpd){this.wvDel-=dt*16.67;if(this.wvDel<=0){this.boss=new Boss(this.mode==='bossrush'?this.bossRushIdx++:Math.floor(this.wave/5)-1,this.wave);this.bossSpd=true;}}
    // Next wave
    if(this.eLft<=0&&this.toSp<=0&&!this.boss){
      // Upgrade every 3 waves (or every boss kill)
      if(this.wave%3===0||this.isBoss)this.showUpgradePicker();
      // Ad every 4 waves
      this.adWvCnt++;if(this.adWvCnt>=4){this.adWvCnt=0;this.sdk.midAd();}
      // Blitz check
      if(this.mode==='blitz'&&this.wave>=15){this.gameOver();return;}
      this.nextWave();
    }
    // Bullets
    this.bul.update(dt,this.enemies,this.boss);
    // Power-ups
    for(let i=this.pus.length-1;i>=0;i--){this.pus[i].update(dt,this.pl.magnet,this.pl.x,this.pl.y);if(!this.pus[i].alive)this.pus.splice(i,1);}
    this.par.update(dt);
    // Shake
    if(this.shD>0){this.shD-=dt*16.67;this.shX=(Math.random()-.5)*this.shI;this.shY=(Math.random()-.5)*this.shI;}else{this.shX=0;this.shY=0;}
    // Collisions
    this.collide();
    // XP level up
    // Player death
    if(!this.pl.alive){this.par.emit(this.pl.x,this.pl.y,40,{ms:1,xs:6,l:500,s:6,c:this.pl.color});this.par.emit(this.pl.x,this.pl.y,25,{ms:2,xs:8,l:300,s:4,c:'#fff'});this.shake(8,400);this.aud.explode();setTimeout(()=>this.gameOver(),700);this.state='DYING';}
  }

  collide(){
    const act=this.bul.active();
    // Player bullets vs enemies
    for(const b of act){if(!b.pl||!b.a)continue;
    for(const e of this.enemies){if(!e.alive)continue;if(ch(b.x,b.y,b.r,e.x,e.y,e.r)){if(b.pierce>0)b.pierce--;else b.a=false;const isCrit=b.d>this.pl.baseDmg+this.pl.dmgBonus;
    if(e.takeDmg(b.d)){const pts=this.addScore(e.score);this.popup(e.x,e.y-15,'+'+pts,isCrit?'#ff0':'#fff');this.par.emit(e.x,e.y,14,{ms:1,xs:4,l:300,s:5,c:e.color});if(b.explode)this.par.emit(e.x,e.y,20,{ms:2,xs:5,l:200,s:6,c:'#f80'});this.aud.explode();this.kills++;this.pl.killStreak++;this.pl.streakT=2000;if(this.pl.killStreak>this.maxStreak)this.maxStreak=this.pl.killStreak;if(this.pl.killStreak%10===0)this.aud.streak(this.pl.killStreak/10);
    const lvl=this.pl.addXP(e.score*.3);if(lvl)this.aud.levelUp();
    tryDrop(e.x,e.y,this.pus,this.pl.luckMult);
    // Splitter
    if(e.type==='splitter'){for(let j=0;j<2;j++){const ne=new Enemy('swarm',e.x+(j?15:-15),e.y,this.wave);this.enemies.push(ne);this.eLft++;}}
    }else{this.par.emit(b.x,b.y,3,{ms:.5,xs:2,l:120,s:3,c:'#fff'});}if(!b.pierce)break;}}
    // vs boss
    if(b.a&&this.boss&&this.boss.alive){if(ch(b.x,b.y,b.r,this.boss.x,this.boss.y,this.boss.r)){if(b.pierce>0)b.pierce--;else b.a=false;this.boss.takeDmg(b.d);this.par.emit(b.x,b.y,4,{ms:.5,xs:2,l:120,s:3,c:this.boss.color});}}}
    // Enemy bullets + body vs player
    if(this.pl.alive){for(const b of act){if(b.pl||!b.a)continue;if(ch(b.x,b.y,b.r,this.pl.x,this.pl.y,this.pl.r)){b.a=false;if(this.pl.takeDmg(this.aud)){this.noHitBoss=false;}this.shake(4,200);}}
    for(const e of this.enemies){if(!e.alive)continue;if(ch(this.pl.x,this.pl.y,this.pl.r,e.x,e.y,e.r)){this.pl.takeDmg(this.aud);e.alive=false;this.par.emit(e.x,e.y,12,{ms:1,xs:4,l:300,s:5,c:e.color});this.aud.explode();this.shake(4,200);}}
    if(this.boss&&this.boss.alive&&!this.boss.entering){if(ch(this.pl.x,this.pl.y,this.pl.r,this.boss.x,this.boss.y,this.boss.r)){this.pl.takeDmg(this.aud);this.noHitBoss=false;this.shake(5,300);}}
    // Orbiter damage
    if(this.pl.orbiters>0){for(let i=0;i<this.pl.orbiters*2;i++){const a=this.pl.orbAngle+i*(Math.PI*2/(this.pl.orbiters*2));const ox=this.pl.x+Math.cos(a)*30,oy=this.pl.y+Math.sin(a)*30;for(const e of this.enemies){if(!e.alive)continue;if(ch(ox,oy,5,e.x,e.y,e.r)){e.takeDmg(1);this.par.emit(ox,oy,3,{ms:.5,xs:2,l:100,s:3,c:'#0df'});}}}}
    // Power-ups
    for(let i=this.pus.length-1;i>=0;i--){const pu=this.pus[i];if(ch(this.pl.x,this.pl.y,this.pl.r+10,pu.x,pu.y,pu.r)){if(pu.type==='health'){this.pl.hp=Math.min(this.pl.hp+1,this.pl.maxHp);this.popup(pu.x,pu.y-10,'+HP','#f44');}else if(pu.type==='xp'){const lvl=this.pl.addXP(50);if(lvl)this.aud.levelUp();this.popup(pu.x,pu.y-10,'+XP','#0ff');}else if(pu.type==='crystal'){this.crystalsEarned+=5;this.popup(pu.x,pu.y-10,'+5💎','#a5f');}
    this.aud.powerUp();this.par.emit(pu.x,pu.y,8,{ms:1,xs:3,l:200,s:4,c:pu.type==='health'?'#f44':pu.type==='xp'?'#0ff':'#a5f'});this.pus.splice(i,1);}}}
  }

  // ═══════ RENDER ═══════
  render(){
    const c=this.cx;c.clearRect(0,0,W,H);
    const z=ZONES[this.zone]||ZONES[0];
    const bg=c.createLinearGradient(0,0,0,H);bg.addColorStop(0,z.bg1);bg.addColorStop(1,z.bg2);c.fillStyle=bg;c.fillRect(0,0,W,H);
    for(const s of this.stars){s.y+=s.sp;if(s.y>H+4){s.y=-4;s.x=Math.random()*W;}c.globalAlpha=s.op;c.fillStyle=z.star;c.fillRect(s.x,s.y,s.sz,s.sz);}c.globalAlpha=1;
    if(this.state==='MENU')return;
    c.save();c.translate(this.shX,this.shY);
    for(const pu of this.pus)pu.draw(c);
    for(const e of this.enemies)e.draw(c);
    if(this.boss)this.boss.draw(c);
    this.bul.draw(c);
    if(this.pl)this.pl.draw(c);
    this.par.draw(c);
    // Score popups
    for(const p of this.popups){c.globalAlpha=Math.min(1,p.t/300);c.font='bold 13px sans-serif';c.fillStyle=p.c;c.textAlign='center';c.fillText(p.txt,p.x,p.y);c.globalAlpha=1;}
    c.restore();
    this.drawHUD(c);
  }

  drawHUD(c){
    if(!this.pl)return;
    c.save();
    // Score
    c.font='bold 20px "Segoe UI",system-ui,sans-serif';c.fillStyle='#fff';c.textAlign='right';c.fillText(this.score.toLocaleString(),W-14,38);
    if(this.combo>1.2){c.font='bold 12px sans-serif';c.fillStyle='#ff0';c.fillText(`x${this.combo.toFixed(1)}`,W-14,54);}
    // Kill streak
    if(this.pl.killStreak>=5){c.font='bold 11px sans-serif';c.fillStyle='#f80';c.fillText(`🔥 ${this.pl.killStreak} STREAK`,W-14,68);}
    // Wave + Zone
    c.textAlign='left';c.font='bold 11px sans-serif';c.fillStyle='rgba(255,255,255,.4)';c.fillText(`WAVE ${this.wave}`,14,54);
    c.font='9px sans-serif';c.fillStyle=ZONES[this.zone]?.accent||'#fff';c.fillText(ZONES[this.zone]?.name||'',14,66);
    // Hearts
    for(let i=0;i<this.pl.maxHp;i++){c.font='18px sans-serif';c.fillStyle=i<this.pl.hp?'#f44':'#333';c.fillText('♥',14+i*22,38);}
    // XP bar
    const xbW=W-28,xbH=4,xbX=14,xbY=H-16;c.fillStyle='rgba(255,255,255,.1)';c.fillRect(xbX,xbY,xbW,xbH);c.fillStyle='#0df';c.fillRect(xbX,xbY,xbW*(this.pl.xp/this.pl.xpNext),xbH);c.font='8px sans-serif';c.fillStyle='rgba(255,255,255,.35)';c.textAlign='center';c.fillText(`LVL ${this.pl.level}`,W/2,xbY-3);
    // Upgrade indicators
    let py=78;c.textAlign='left';c.font='bold 9px sans-serif';
    if(this.pl.shield){c.fillStyle='#4af';c.fillText(`SHIELD ${Math.ceil(this.pl.shieldT/1000)}s`,14,py);py+=12;}
    if(this.pl.sideGuns){c.fillStyle='#8f8';c.fillText(`SIDE x${this.pl.sideGuns}`,14,py);py+=12;}
    if(this.pl.homing){c.fillStyle='#f80';c.fillText(`HOMING x${this.pl.homing}`,14,py);py+=12;}
    if(this.pl.drone){c.fillStyle='#8f8';c.fillText(`DRONE x${this.pl.drone}`,14,py);py+=12;}
    // Boss HP
    if(this.boss&&this.boss.alive)this.boss.drawHP(c);
    // Wave text
    if(this.wvTxtT>0){const a=Math.min(1,this.wvTxtT/400);c.globalAlpha=a;c.font='bold 30px "Segoe UI",system-ui,sans-serif';c.textAlign='center';c.fillStyle='#fff';c.shadowColor=ZONES[this.zone]?.accent||'#0af';c.shadowBlur=18;c.fillText(this.wvTxt,W/2,H/2-40);c.shadowBlur=0;c.globalAlpha=1;}
    // Blitz timer
    if(this.mode==='blitz'){c.font='bold 14px sans-serif';c.textAlign='center';c.fillStyle='#f80';c.fillText(`${15-this.wave} WAVES LEFT`,W/2,H-30);}
    c.restore();
  }

  loop(t){const dt=Math.min((t-this.lt)/16.67,3);this.lt=t;if(this.state==='PLAYING')this.update(dt);this.render();requestAnimationFrame(ts=>this.loop(ts));}
}

// ═══════ UTILS ═══════
function ch(x1,y1,r1,x2,y2,r2){const dx=x1-x2,dy=y1-y2,rr=r1+r2;return dx*dx+dy*dy<rr*rr;}
function menu(id,hide){document.getElementById(id).classList[hide?'add':'remove']('h');}
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);};}
window.addEventListener('DOMContentLoaded',()=>new Game());
</script>
